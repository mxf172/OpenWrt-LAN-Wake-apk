name: 云编译 LAN-Wake APK (IPQ60xx)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 准备编译环境
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget curl zstd

      - name: 下载并解压 SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/snapshots/targets/qualcommax/ipq60xx/openwrt-sdk-qualcommax-ipq60xx_gcc-14.4.0_musl.Linux-x86_64.tar.zst"
          wget "$SDK_URL"
          
          # 解压文件
          tar -I zstd -xf openwrt-sdk-*.tar.zst
          
          # 自动获取解压出来的实际目录名，并重命名为 sdk
          # 这样即使目录名发生微小变化，脚本也不会报错
          REAL_NAME=$(ls -d openwrt-sdk-*/ | head -n 1 | cut -f1 -d'/')
          
          mv "$REAL_NAME" sdk
          
      - name: 手动导入 LAN-Wake 源码
        run: |
          # 直接进入 SDK 的 package 目录，将插件源码克隆到这里
          # 这样编译系统会自动将其识别为本地包，无需配置 feeds
          cd sdk/package
          git clone https://github.com/adminchenyu/LAN-Wake.git luci-app-lan-wake

      - name: 配置并编译 APK
        run: |
          cd sdk
          # 1. 强制初始化 feeds，确保安装 luci 组件库
          ./scripts/feeds update -a
          # 这一步至关重要，它会把 luci.mk 等编译必需的支撑文件下载到 sdk/feeds/luci/ 下
          ./scripts/feeds install -a
          
          # 2. 生成配置
          make defconfig
          
          # 3. 执行编译
          make package/luci-app-lan-wake/compile V=s
          
      - name: 收集 APK 文件
        run: |
          mkdir -p ./artifact
          # 查找生成的 apk 文件
          find sdk/bin/packages/ -name "luci-app-lan-wake*.apk" -exec cp {} ./artifact/ \;

      - name: 上传 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-lan-wake-ipq60xx
          path: ./artifact/*.apk
