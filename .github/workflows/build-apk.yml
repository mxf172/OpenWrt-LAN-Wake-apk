name: Build LAN-Wake APK

on:
  workflow_dispatch:
    inputs:
      sdk_url:
        description: 'OpenWrt SDK 下载链接 (请根据你的路由器架构替换)'
        required: true
        default: 'https://downloads.openwrt.org/snapshots/targets/x86/64/openwrt-sdk-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.xz'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 准备编译环境
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

    - name: 下载并解压 OpenWrt SDK
      run: |
        wget -O sdk.tar.xz ${{ github.event.inputs.sdk_url }}
        mkdir sdk
        tar -Jxf sdk.tar.xz -C sdk --strip-components=1

    - name: 获取 LAN-Wake 源码
      run: |
        cd sdk/package
        git clone https://github.com/adminchenyu/LAN-Wake.git

    - name: 更新及安装 Feeds
      run: |
        cd sdk
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 配置并开始编译
      run: |
        cd sdk
        make defconfig
        echo "CONFIG_PACKAGE_luci-app-lan-wake=m" >> .config
        make defconfig
        make package/LAN-Wake/compile V=s

    - name: 提取编译结果
      uses: actions/upload-artifact@v4
      with:
        name: LAN-Wake-APK-Package
        path: sdk/bin/packages/**/*.apk
