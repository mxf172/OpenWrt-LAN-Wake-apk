name: Build LAN-Wake APK

on:
  workflow_dispatch:
    inputs:
      sdk_url:
        description: 'OpenWrt SDK 下载链接 (请根据你的路由器架构替换)'
        required: true
        default: 'https://downloads.openwrt.org/snapshots/targets/qualcommax/ipq60xx/openwrt-sdk-qualcommax-ipq60xx_gcc-14.4.0_musl.Linux-x86_64.tar.zst'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 准备编译环境
      run: |
        sudo apt update
        # 新增了 zstd 依赖，以支持最新的 .zst 格式压缩包
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget zstd

    - name: 下载并解压 OpenWrt SDK
      run: |
        # 移除了写死的 .tar.xz 后缀
        wget -O sdk_archive ${{ github.event.inputs.sdk_url }}
        mkdir sdk
        # 去掉了 -J 参数，让系统自动识别压缩格式（无论是 xz 还是 zst 都能解压）
        tar -xf sdk_archive -C sdk --strip-components=1
        
    - name: 获取 LAN-Wake 源码
      run: |
        cd sdk/package
        git clone https://github.com/adminchenyu/LAN-Wake.git

    - name: 更新及安装 Feeds
      run: |
        cd sdk
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 配置并开始编译
      run: |
        cd sdk
        make defconfig
        echo "CONFIG_PACKAGE_luci-app-lan-wake=m" >> .config
        make defconfig
        make package/LAN-Wake/compile V=s

    - name: 提取编译结果
      uses: actions/upload-artifact@v4
      with:
        name: LAN-Wake-APK-Package
        path: sdk/bin/packages/**/*.apk
